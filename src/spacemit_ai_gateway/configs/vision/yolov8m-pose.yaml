test_image: ~/.cache/assets/image/006_test.jpg
label_file_path: spacemit_ai_gateway/domains/vision/assets/labels/coco.txt
image_size: [640, 640]
class: deploy.yolov8_pose.YOLOv8PoseDetector
default_params:
  conf_threshold: 0.25
  iou_threshold: 0.45
  num_threads: 4
  providers:
    - SpaceMITExecutionProvider
