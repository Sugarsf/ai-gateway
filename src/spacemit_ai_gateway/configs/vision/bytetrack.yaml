# ByteTrack 目标追踪模型配置
model_path: ~/.cache/models/vision/yolov8/yolov8n_no_dfl.q.onnx
test_video: ~/.cache/assets/video/003_palace.mp4
image_size: [640, 640]
label_file_path: spacemit_ai_gateway/domains/vision/assets/labels/coco.txt
class: deploy.bytetrack.ByteTrackTracker
default_params:
  conf_threshold: 0.25
  iou_threshold: 0.45
  track_buffer: 30
  frame_rate: 30
  num_threads: 3
  providers:
    - SpaceMITExecutionProvider
