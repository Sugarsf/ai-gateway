# YOLOv8s 目标检测模型配置
model_path: ~/.cache/models/vision/yolov8/yolov8s_no_dfl.q.onnx
test_image: ~/.cache/assets/image/006_test.jpg
label_file_path: src/spacemit_ai_gateway/domains/vision/assets/labels/coco.txt
image_size: [640, 640]
class: deploy.yolov8.YOLOv8Detector
default_params:
  conf_threshold: 0.25
  iou_threshold: 0.45
  num_threads: 4
  providers:
    - SpaceMITExecutionProvider
