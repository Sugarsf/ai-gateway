# SpacemiT AI Gateway 基础配置

app:
  name: "SpacemiT AI Gateway"
  version: "0.1.4"
  host: "0.0.0.0"
  port: 18790
  debug: false

auth:
  enabled: false          # 默认关闭鉴权；需要时改为 true
  api_keys: []            # enabled=true 时从环境变量或密钥管理服务获取
  ip_whitelist: []        # enabled=true 时可配置 CIDR/IP 白名单
  ip_whitelist_file: null # enabled=true 时可配置外部白名单文件，支持热加载

limits:
  max_upload_bytes: 52428800  # 50 MB

asr:
  backend: "sensevoice"        # 默认后端: sensevoice | qwen3-asr
  # backends: ["sensevoice", "qwen3-asr"]  # 预载多后端，请求 model 字段路由
  model_dir: null              # null → ~/.cache/models/asr/<backend>
  models:
    - id: "sensevoice"
      url: "https://archive.spacemit.com/spacemit-ai/model_zoo/asr/sensevoice.tar.gz"
      archive_name: "sensevoice.tar.gz"
      archive_subdir: "sensevoice"
  language: "zh"
  punctuation: true
  provider: "spacemit"         # cpu | spacemit
  qwen3:
    endpoint: "http://127.0.0.1:8063/v1/chat/completions"
    model: "qwen3-asr"
    timeout: 60
  stream:
    session_ttl_s: 300
    event_queue_size: 64
    partial_results: true

tts:
  backend: "matcha_zh_en"      # 默认后端: matcha_zh | matcha_en | matcha_zh_en | kokoro
  # backends: ["matcha_zh_en", "kokoro"]    # 预载多后端，请求 model 字段路由；默认不预载多个，避免占用内存
  model_dir: null
  models:
    - id: "matcha_zh_en"
      url: "https://archive.spacemit.com/spacemit-ai/model_zoo/tts/matcha-tts/matcha-icefall-zh-en.tar.gz"
      archive_name: "matcha-icefall-zh-en.tar.gz"
      vocoder_name: "vocos-16khz-univ.onnx"
      vocoder_url: "https://archive.spacemit.com/spacemit-ai/model_zoo/tts/vocoder/vocos-16khz-univ.onnx"
  speed: 1.0
  volume: 50.0
  pitch: 1.0
  # sample_rate: 22050         # 不设则用 preset 默认（matcha_zh=22050, matcha_zh_en=16000, kokoro=24000）
  default_format: "wav"        # wav | pcm
  stream:
    session_ttl_s: 300
    event_queue_size: 64

vad:
  backend: "silero"
  model_dir: null
  trigger_threshold: 0.5
  stop_threshold: 0.35
  min_speech_ms: 250
  max_silence_ms: 500
  sample_rate: 16000
  stream:
    event_queue_size: 64

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

llm:
  backend: "qwen3-0.6b-q4_0"         # 默认后端
  # backends: ["qwen3-0.6b-q4_0", "qwen3.5-2b-q4_0"]       # 预载多后端
  default_args: ["--ctx-size", "4096", "--threads", "8", "--metrics", "--reasoning", "off"]
  port_pool:
    start: 18800
    end: 18900
  storage:
    base_dir: "~/.cache/spacemit-ai-gateway/llm"
    models_dir: "~/.cache/models/llm"
